    <main class="container">
        <h2 class="title">Entre em Contato</h2>
        <form>
            <fieldset>
                <label for="name">Nome:</label>
                <input type="text" name="name" id="name" placeholder="Digite o seu nome" required>
            </fieldset>
            <fieldset>
                <label for="email">E-mail:</label>
                <input type="email" name="email" id="email" placeholder="Digite o seu e-mail" required>
            </fieldset>
            <fieldset>
                <label for="message">Mensagem:</label>
                <textarea name="message" id="message" rows="10" placeholder="Digite a sua mensagem" required></textarea>
            </fieldset>
            <fieldset>
                <input type="submit" value="Enviar">
            </fieldset>
        </form>

        </div>
